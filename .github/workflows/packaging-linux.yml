name: Packaging Linux x86_64

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/packaging-linux.yml"
      - "apps/agent/**"
      - "apps/server/**"
      - "apps/desktop/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  build-linux-installers:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.3"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            wget \
            xdg-utils

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native x86_64 AppImage and deb through the release entrypoint
        run: pnpm release -- --target x86_64-unknown-linux-gnu --verify

      - name: Create non-secret artifact manifest
        run: |
          shopt -s nullglob
          appimages=(apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage)
          debs=(apps/desktop/src-tauri/target/release/bundle/deb/*.deb)
          if [ "${#appimages[@]}" -ne 1 ]; then
            echo "Expected exactly one AppImage, found ${#appimages[@]}" >&2
            exit 1
          fi
          if [ "${#debs[@]}" -ne 1 ]; then
            echo "Expected exactly one deb, found ${#debs[@]}" >&2
            exit 1
          fi
          APPIMAGE="${appimages[0]}"
          DEB="${debs[0]}"
          AGENT="apps/desktop/src-tauri/binaries/paladin-agent-sidecar-x86_64-unknown-linux-gnu"
          SERVER="apps/desktop/src-tauri/binaries/paladin-server-sidecar-x86_64-unknown-linux-gnu"
          mkdir -p linux-artifact
          cp "$APPIMAGE" "linux-artifact/$(basename "$APPIMAGE")"
          cp "$DEB" "linux-artifact/$(basename "$DEB")"
          node apps/desktop/scripts/build-manifest.mjs \
            --commit "${{ github.sha }}" \
            --runner-os "${{ runner.os }}" \
            --target "$TARGET_TRIPLE" \
            --agent "$AGENT" \
            --server "$SERVER" \
            --installer "$APPIMAGE" \
            --installer "$DEB" \
            --output "linux-artifact/build-manifest.json"

      - name: Upload AppImage, deb, and manifest only
        uses: actions/upload-artifact@v4
        with:
          name: paladin-linux-x86_64-installers-${{ github.sha }}
          path: |
            linux-artifact/*.AppImage
            linux-artifact/*.deb
            linux-artifact/build-manifest.json
          if-no-files-found: error
          retention-days: 14
