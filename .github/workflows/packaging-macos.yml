name: Packaging macOS arm64

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/packaging-macos.yml"
      - "apps/agent/**"
      - "apps/server/**"
      - "apps/desktop/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  build-dmg:
    runs-on: macos-14
    timeout-minutes: 45
    env:
      TARGET_TRIPLE: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.3"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native arm64 DMG through the release entrypoint
        run: pnpm release -- --target aarch64-apple-darwin --verify

      - name: Create non-secret artifact manifest
        run: |
          shopt -s nullglob
          dmgs=(apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "Expected exactly one DMG, found ${#dmgs[@]}" >&2
            exit 1
          fi
          DMG="${dmgs[0]}"
          AGENT="apps/desktop/src-tauri/binaries/paladin-agent-sidecar-aarch64-apple-darwin"
          SERVER="apps/desktop/src-tauri/binaries/paladin-server-sidecar-aarch64-apple-darwin"
          mkdir -p macos-artifact
          cp "$DMG" "macos-artifact/$(basename "$DMG")"
          node apps/desktop/scripts/build-manifest.mjs \
            --commit "${{ github.sha }}" \
            --runner-os "${{ runner.os }}" \
            --target "$TARGET_TRIPLE" \
            --agent "$AGENT" \
            --server "$SERVER" \
            --installer "$DMG" \
            --output "macos-artifact/build-manifest.json"

      - name: Upload DMG and manifest only
        uses: actions/upload-artifact@v4
        with:
          name: paladin-macos-aarch64-dmg-${{ github.sha }}
          path: |
            macos-artifact/*.dmg
            macos-artifact/build-manifest.json
          if-no-files-found: error
          retention-days: 14
