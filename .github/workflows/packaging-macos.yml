name: Packaging macOS arm64

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/packaging-macos.yml"
      - "apps/agent/**"
      - "apps/server/**"
      - "apps/desktop/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  build-dmg:
    runs-on: macos-14
    timeout-minutes: 45
    env:
      TARGET_TRIPLE: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.3"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native arm64 DMG through the release entrypoint
        run: pnpm release -- --target aarch64-apple-darwin --verify
