name: Packaging Windows x64

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/packaging-windows.yml"
      - "apps/agent/**"
      - "apps/server/**"
      - "apps/desktop/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  build-msi:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      TARGET_TRIPLE: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.3"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native x64 MSI through the release entrypoint
        run: pnpm release -- --target x86_64-pc-windows-msvc --verify

      - name: Create non-secret artifact manifest
        shell: pwsh
        run: |
          $msi = @(Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/msi/*.msi")
          if ($msi.Count -ne 1) { throw "Expected exactly one MSI, found $($msi.Count)" }
          $agent = "apps/desktop/src-tauri/binaries/paladin-agent-sidecar-x86_64-pc-windows-msvc.exe"
          $server = "apps/desktop/src-tauri/binaries/paladin-server-sidecar-x86_64-pc-windows-msvc.exe"
          New-Item -ItemType Directory -Force -Path "windows-artifact" | Out-Null
          Copy-Item $msi[0].FullName "windows-artifact/$($msi[0].Name)"
          node apps/desktop/scripts/build-manifest.mjs --commit "${{ github.sha }}" --runner-os "${{ runner.os }}" --target "$env:TARGET_TRIPLE" --agent $agent --server $server --installer $msi[0].FullName --output "windows-artifact/build-manifest.json"

      - name: Upload MSI and manifest only
        uses: actions/upload-artifact@v4
        with:
          name: paladin-windows-x86_64-msi-${{ github.sha }}
          path: |
            windows-artifact/*.msi
            windows-artifact/build-manifest.json
          if-no-files-found: error
          retention-days: 14
